# Example config for norwegian-fours-video-generator.
# Copy to config.yaml and edit paths.

intro:
  title: "Norwegian Fours"

intervals: 4
total_minutes: 40

# Counts: work_clips == intervals; recover_clips == intervals + 1
# (warmup, then `intervals - 1` between-set recoveries, then the final buffer).
work_clips:
  - { file: clips/work_1.mp4, offset: 0 }
  - { file: clips/work_2.mp4, offset: 0 }
  - { file: clips/work_3.mp4, offset: 0 }
  - { file: clips/work_4.mp4, offset: 0 }

recover_clips:
  - { file: clips/warmup.mp4,    offset: 0 }
  - { file: clips/recover_1.mp4, offset: 0 }
  - { file: clips/recover_2.mp4, offset: 0 }
  - { file: clips/recover_3.mp4, offset: 0 }
  - { file: clips/buffer.mp4,    offset: 0 }
